name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dizzaract
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: dizzaract
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dizzaract"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://dizzaract:changeme@localhost:5432/dizzaract
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-only-secret-not-for-prod-use
      JWT_ACCESS_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: 7

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run migrations
        run: node ./node_modules/typeorm/cli.js migration:run -d dist/database/data-source.js

      - name: Unit tests
        run: npm test

      - name: Integration / e2e tests
        run: npm run test:e2e

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t dizzaract-api:ci -f docker/Dockerfile .
